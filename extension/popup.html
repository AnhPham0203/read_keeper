<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="header">
    <span class="logo">🔖 Readkeeper</span>
    <button id="settings-btn" class="icon-btn" title="Cài đặt">⚙</button>
  </header>

  <!-- Main: save article -->
  <div id="main-view">
    <div class="field">
      <label class="label">Tiêu đề</label>
      <input id="title-input" type="text" class="input" placeholder="Tiêu đề bài viết...">
    </div>

    <div class="field">
      <label class="label">Tags</label>
      <div id="tag-pills" class="tag-pills"></div>
      <input id="tag-input" type="text" class="input" placeholder="Nhập tag rồi Enter…">
    </div>

    <button id="save-btn" class="save-btn">💾 Lưu bài này</button>
    <div id="status" class="status"></div>
  </div>

  <!-- Settings: configure API URL + token -->
  <div id="settings-view" hidden>
    <div class="field">
      <label class="label">API URL</label>
      <input id="api-url-input" type="url" class="input" placeholder="https://your-app.vercel.app">
    </div>
    <div class="field">
      <label class="label">Auth Token</label>
      <input id="token-input" type="password" class="input" placeholder="access_token từ Supabase session">
    </div>
    <button id="save-settings-btn" class="save-btn">Lưu cài đặt</button>
    <p class="hint">
      Lấy token: Mở web app → F12 → Application → Local Storage →
      tìm key <code>sb-*-auth-token</code> → copy giá trị <code>access_token</code>.
    </p>
  </div>

  <script src="popup.js"></script>
</body>
</html>
